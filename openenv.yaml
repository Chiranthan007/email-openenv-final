name: email-classification-env
description: An OpenEnv environment for classifying emails as spam or not_spam with increasing difficulty.
version: 1.0.0

environment:
  entrypoint: app.environment:EmailEnv

tasks:
  - id: easy
    description: Classify obvious spam vs normal emails

  - id: medium
    description: Classify promotional vs transactional emails

  - id: hard
    description: Detect subtle phishing attempts

observation_space:
  type: EmailObservation

action_space:
  type: EmailAction

reward_space:
  type: EmailReward